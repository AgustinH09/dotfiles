# This file probably doesn't exist, which caused the first error.
# If you don't have an "other.conf", you should remove this line.
# include other.conf

globinclude kitty.d/**/*.conf
envinclude KITTY_CONF_*

font_family Fira Code Nerd Font
font_size 10.0

scrollback_lines 10000
background_opacity 1
confirm_os_window_close 0
linux_display_server auto

# To show the scrollbar (this is the default):
scrollbar_layout vertical

# Tab bar position is still a valid option
tab_bar_position top

# To customize the tab bar, you now use 'tab_bar_style'.
# For example, to change the font:
# tab_bar_style custom
# tab_font_style bold

# Resize Windows Mapping (This section is fine)
map ctrl+home resize_window reset

# Enable Layouts (This section is fine)
enabled_layouts grid

# BEGIN_KITTY_THEME (This section is fine)
# Your colors for scrollbars, tabs, etc., should be defined in your theme file.
include current-theme.conf
# END_KITTY_THEME

# Kitty Broadcast (This section is fine)
map f1 launch --allow-remote-control kitty +kitten broadcast

# Keyboard Shortcuts (This section is fine)
# map ctrl+f launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/fzf --no-sort --no-mouse --exact -i
map ctrl+i send_text all \x1b[105;6u

# Tmux init - Done through .zshrc
# shell tmux new-session -A -s main

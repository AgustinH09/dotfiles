# ─────────────────────────────────────────────────────────────────────────────
# PERSONAL PRINCIPAL CONFIG
# This file is sourced LAST by hyprland.conf, so it is safe to override any
# upstream defaults here. Keep all your personal tweaks in this file only,
# that way a simple `git pull` of the upstream repo will never result in
# merge-conflicts.
#
# Section layout
#   1. Variables & distro specific source
#   2. Keybind overrides / additions
#   3. Input / GPU / XWayland tweaks
#   4. Environment variables & autostart
#   5. Window rules (new default opaque behaviour)
# ─────────────────────────────────────────────────────────────────────────────
$Personal = $HOME/.config/hypr/personal
$mainMod = SUPER

# Source distro-specific config automatically.
# The $HYPRLAND_DISTRO_CONFIG variable is set by the launcher script.
source= $Personal/$HYPRLAND_DISTRO_CONFIG

# Keybings: configs/Keybings.conf
# Resize windows
binde = $mainMod SHIFT, h, resizeactive,-50 0
binde = $mainMod SHIFT, l, resizeactive,50 0
binde = $mainMod SHIFT, k, resizeactive,0 -50
binde = $mainMod SHIFT, j, resizeactive,0 50

# Move Windows
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, j, movewindow, d

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# UserKeybinds
# Unbind
unbind = $mainMod, E # file manager
unbind = $mainMod, H # help / cheat sheet
unbind = $mainMod SHIFT, Return
unbind = $mainMod SHIFT, O # Zsh change theme
bind = $mainMod SHIFT, O, exec, $scriptsDir/ToggleAllOpacity.sh # toggle opacity for all windows

bind = $mainMod, T, exec, $files #file manager
bind = $mainMod SHIFT, H, exec, $scriptsDir/KeyHints.sh # help / cheat sheet
# bind = $mainMod SHIFT, Return, exec, $UserScripts/scratchpad_manager.sh kitty-dropdown
bind = $mainMod SHIFT, Return, togglespecialworkspace, kitty-dropdown
bind=SUPER_CTRL,space,execr,fcitx5-remote -t
bind=ALT,E,exec,pkill fcitx5 -9;sleep 1;fcitx5 -d --replace; sleep 1;fcitx5-remote -r

# hints https://github.com/alfredosequeida/hints
bind = SUPER, I, exec, hints
bind = SUPER, Y, exec, hints --mode scroll

# Animations
animations {
  enabled = true

  bezier = easeOutExpo, 0.16, 1, 0.3, 1
  animation = specialWorkspace, 1, 7, easeOutExpo, fade
}

# UserSettings
input {
  # Keyboard
  kb_options = caps:escape_shifted_capslock

  # Touchpad
  touchpad {
    natural_scroll = false
    clickfinger_behavior = 1
  }

  # Stylus
	tablet {
    output = eDP-1 #Only Main Screen
  }

}

cursor {
  min_refresh_rate = 60      # don' let Hyprland drop below 60 Hz on HDMI-A-1
  no_hardware_cursors = 1    # disable hardware cursors for better performance


}

misc {
  vfr = true
}

# Nvidia
opengl {
  nvidia_anti_flicker = true
}

xwayland {
  # enabled = true
}

# UserDecorations: UserConfigs/UserDecorations.conf
general {
  border_size = 2
  gaps_in = 6
  gaps_out = 8
}

# ENVariables: UserConfigs/ENVariables.conf
# Fcitx5
env = GTK_IM_MODULE,wayland
env = LC_CTYPE,en_US.UTF-8
env = XMODIFIERS,"@im=fcitx"
env = QT_IM_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus

# Nvidia Additionals
env = GBM_BACKEND,nvidia-drm

env = __GL_GSYNC_ALLOWED,1 #adaptive Vsync
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only
# env = WLR_DRM_NO_ATOMIC,1


env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# LIBGL_ALWAYS_SOFTWARE software mesa rendering
# env = LIBGL_ALWAYS_SOFTWARE,1 # Warning. May cause hyprland to crash
# env = WLR_RENDERER_ALLOW_SOFTWARE,1

# Nvidia Firefox
env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland

# Accessibility (for hints)
env = ACCESSIBILITY_ENABLED, 1
env = GTK_MODULES,gail:atk-bridge
env = OOO_FORCE_DESKTOP,gnome
env = GNOME_ACCESSIBILITY,1
env = QT_ACCESSIBILITY,1
env = QT_LINUX_ACCESSIBILITY_ALWAYS_ON,1

# Startup Apps: UserConfigs/Startup_Apps.conf
# Startup Apps
exec-once = ags
exec-once = blueman-applet
# Rainbow borders
exec-once = $UserScripts/RainbowBorders.sh

# Fcitx5
exec-once=fcitx5-remote -r
exec-once=fcitx5 -d --replace

# Gnome-keyring
exec-once = eval $(/usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh) && export SSH_AUTH_SOCK


# Share screen
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# wlsunset
exec-once = sleep 50 && /usr/local/bin/wlsunset -S 5:00 -s 18:00  > ~/.config/wlsunset.log 2>&1 ;notify-send "Brightness value changed: $(wlsunset -l)"

# KDE connect
exec-once = /usr/bin/kdeconnect-indicator

# ActivityWatch
exec-once = aw-qt
# Custom watcher for hyprland: https://github.com/bobvanderlinden/aw-watcher-window-hyprland
exec-once = aw-watcher-window-hyprland --host 127.0.0.1 --port 5600 --poll-time 2


# WindowRules
windowrulev2 = float,class:^(kitty-dropdown)$
windowrulev2 = size 70% 60%,class:^(kitty-dropdown)$
windowrulev2 = move 15% 5%,class:^(kitty-dropdown)$
# ─────────────────────────────
#  Default window opacity
#  Start FULLY OPAQUE and keep the upstream transparency rules available
#  for when you toggle them with SUPER+CTRL+O
# ─────────────────────────────
windowrulev2 = opaque,class:^(.*)$

# Workspaces
workspace = special:kitty-dropdown, on-created-empty:kitty --class kitty-dropdown
